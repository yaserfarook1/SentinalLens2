# Claude Agent Teams Configuration

orchestrator:
  name: SentinelAuditTeam
  description: Multi-agent team for Sentinel workspace audits
  max_iterations: 10
  timeout_seconds: 600

  # Agent execution strategy
  execution:
    parallel_limit: 3  # Max agents running in parallel
    retry_attempts: 2
    retry_delay_ms: 1000
    fail_on_agent_error: false  # Continue even if agent fails

# Define team agents
agents:
  - name: data_collector
    role: Data Collection Agent
    description: Fetches tables, rules, and metadata from Sentinel workspace
    model: claude-opus-4-6
    instructions: |
      You are the Data Collector Agent in a multi-agent audit team.
      Your responsibility is to gather workspace data reliably.

      TASKS:
      1. List all tables in the workspace
      2. Retrieve analytics rules
      3. Fetch workbooks and hunt queries
      4. Get data connectors
      5. Validate data completeness

      REQUIREMENTS:
      - Return structured JSON
      - Include record counts
      - Flag any missing data
      - Handle API errors gracefully

      Format response as:
      {
        "tables": [...],
        "rules": [...],
        "workbooks": [...],
        "connectors": [...],
        "quality_score": 0.95,
        "issues": []
      }

    dependencies: []  # Runs first, no dependencies
    timeout_seconds: 120

  - name: ingestion_analyzer
    role: Ingestion Analysis Agent
    description: Analyzes ingestion volume and data patterns
    model: claude-opus-4-6
    instructions: |
      You are the Ingestion Analysis Agent.
      Analyze ingestion patterns and identify cost drivers.

      TASKS:
      1. Process ingestion data from data_collector
      2. Calculate GB/day per table
      3. Identify top consumers
      4. Detect anomalies
      5. Flag stale tables

      REQUIREMENTS:
      - Use real ingestion data (from CSV if API fails)
      - Calculate accurate metrics
      - Rank tables by cost impact

      Format response as:
      {
        "top_consumers": [...],
        "average_ingestion": 150.5,
        "stale_tables": [...],
        "cost_drivers": [...],
        "recommendations": []
      }

    dependencies: [data_collector]
    timeout_seconds: 60

  - name: cost_calculator
    role: Cost Calculation Agent
    description: Calculates current costs and potential savings
    model: claude-opus-4-6
    instructions: |
      You are the Cost Calculator Agent.
      Compute financial impact and savings opportunities.

      TASKS:
      1. Calculate current ingestion costs (Hot tier)
      2. Estimate Archive tier costs
      3. Compute monthly/annual savings
      4. Identify high-impact optimization targets
      5. Build cost breakdown by table

      REQUIREMENTS:
      - Use Azure pricing: Hot $0.10/GB/day, Archive $0.002/GB/day
      - Provide conservative estimates
      - Show cost impact of each recommendation

      Format response as:
      {
        "current_monthly_cost": 15000,
        "potential_monthly_savings": 5000,
        "annual_savings": 60000,
        "savings_percentage": 33.3,
        "table_costs": [...],
        "optimization_targets": [...]
      }

    dependencies: [ingestion_analyzer]
    timeout_seconds: 60

  - name: report_generator
    role: Report Generation Agent
    description: Generates executive reports and recommendations
    model: claude-opus-4-6
    instructions: |
      You are the Report Generator Agent.
      Create clear, actionable executive reports.

      TASKS:
      1. Synthesize findings from all agents
      2. Create executive summary
      3. Build recommendation list
      4. Generate tables and visualizations
      5. Format for multiple audiences

      REQUIREMENTS:
      - Professional markdown format
      - Data-driven recommendations
      - Clear prioritization
      - Actionable next steps

      Format response as:
      {
        "executive_summary": "...",
        "key_findings": [...],
        "recommendations": [...],
        "detailed_analysis": "...",
        "next_steps": [...]
      }

    dependencies: [cost_calculator, data_collector]
    timeout_seconds: 120

  - name: qa_validator
    role: Quality Assurance Agent
    description: Validates accuracy and completeness of analysis
    model: claude-opus-4-6
    instructions: |
      You are the QA Validator Agent.
      Review and validate all analysis results.

      TASKS:
      1. Check data completeness
      2. Validate calculations
      3. Verify recommendations
      4. Check for inconsistencies
      5. Suggest improvements

      REQUIREMENTS:
      - Flag any discrepancies
      - Verify math and logic
      - Ensure recommendations are actionable
      - Check for missing analysis

      Format response as:
      {
        "validation_passed": true,
        "issues": [],
        "warnings": [],
        "suggestions": [],
        "overall_quality_score": 0.98
      }

    dependencies: [report_generator]
    timeout_seconds: 60

# Tool definitions
tools:
  azure_api:
    enabled: true
    description: Azure API access for workspace data

  cost_calculator:
    enabled: true
    pricing:
      hot_tier: 0.10  # per GB per day
      basic_tier: 0.05
      archive_tier: 0.002

# Logging
logging:
  level: INFO
  format: json
  file: agent-teams.log

# Performance
performance:
  max_concurrent_agents: 3
  timeout_per_agent: 120
  total_timeout: 600
